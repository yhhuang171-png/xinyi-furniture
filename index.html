<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{

html{scroll-behavior:smooth}
body{font-family:Inter,Arial,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--paper);color:var(--ink);line-height:1.62}
a{text-decoration:none;color:inherit}

.container{width:min(1200px,calc(100% - 44px));margin:0 auto}
.topbar{background:var(--deep);color:#eee8dc;font-size:12px;letter-spacing:.2px}

.mini-link{color:#fff;border-bottom:1px solid rgba(184,135,70,.75);padding-bottom:2px;font-weight:600}

.nav-inner{height:78px;display:flex;align-items:center;justify-content:space-between;gap:28px}
.brand{display:flex;align-items:center;gap:14px;min-width:0}

.brand-name{font-size:19px;font-weight:760;white-space:nowrap;color:var(--charcoal)}

.hero{position:relative;overflow:hidden;background:var(--deep);color:#fff}

.btn-primary{background:var(--gold);color:#141411;box-shadow:0 16px 35px rgba(184,135,70,.24)}

.hero-card strong{display:block;font-size:26px;line-height:1.15;margin-bottom:10px}

.hero-contact{display:grid;gap:10px;font-size:14px;color:#34332f}
.hero-contact span{padding-top:10px;border-top:1px solid rgba(32,33,31,.12)}
.facts{background:var(--charcoal);color:#fff}
.facts-grid{display:grid;grid-template-columns:repeat(4,1fr)}
.fact{padding:30px 26px;border-right:1px solid rgba(255,255,255,.1)}
.fact:last-child{border-right:0}
.fact strong{display:block;color:#d6ad70;font-size:31px;line-height:1.1;margin-bottom:6px}
.fact span{color:#c9c2b6;font-size:13px}
.section{padding:86px 0;border-bottom:1px solid var(--line)}

.kicker{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-dark);font-weight:820;margin-bottom:10px}
.title{font-size:clamp(30px,3.4vw,48px);line-height:1.12;color:var(--charcoal);font-weight:780}
.desc{max-width:590px;color:var(--muted);font-size:15px}
.about-grid{display:grid;grid-template-columns:1.02fr .98fr;gap:28px;align-items:stretch}
.about-panel{background:#fff;border:1px solid var(--line);padding:34px;box-shadow:0 20px 50px rgba(32,33,31,.06)}
.about-panel.dark{background:var(--charcoal);color:#f4efe5}
.about-panel h3{font-size:22px;margin-bottom:14px}
.about-panel p{color:#615f58;margin-bottom:18px}
.about-panel.dark p{color:#d7d0c3}
.zh-copy{padding-top:20px;margin-top:22px;border-top:1px solid rgba(32,33,31,.12)}

.about-meta{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:24px}
.meta-item{border:1px solid rgba(255,255,255,.14);padding:16px}
.meta-item span{display:block;font-size:12px;color:#d6ad70;text-transform:uppercase;letter-spacing:1.3px;margin-bottom:5px}

.image-strip{display:grid;grid-template-columns:1.15fr .85fr;gap:14px;height:100%}
.image-strip img{width:100%;height:100%;object-fit:cover;background:#fff;border:1px solid var(--line)}
.factory-section{background:#efebe2}
.factory-layout{display:grid;grid-template-columns:1.08fr .92fr;gap:30px;align-items:start}

.factory-photo img{width:100%;display:block}
.factory-caption{padding:16px 20px;color:var(--muted);font-size:13px;border-top:1px solid var(--line)}
.trust-panel{background:var(--charcoal);color:#f7f2e8;padding:32px;border:1px solid rgba(255,255,255,.12);box-shadow:0 20px 55px rgba(32,33,31,.12)}

.trust-list{display:grid;gap:13px}
.trust-item{display:grid;grid-template-columns:38px 1fr;gap:13px;padding:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.035)}
.trust-num{height:38px;background:rgba(184,135,70,.16);color:#d6ad70;display:grid;place-items:center;font-weight:820}

const toast = document.getElementById("toast");
